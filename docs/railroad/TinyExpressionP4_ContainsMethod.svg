<line x1="637" y1="57" x2="653" y2="57" class="rail"/>
<polygon points="642,54 648,57 642,60" class="arrow"/>
<rect x="653" y="44" width="47" height="26" rx="10" ry="10" class="terminal-box"/>
<text x="676" y="62" text-anchor="middle" class="terminal-text">')'</text>
<line x1="700" y1="57" x2="714" y2="57" class="rail"/>
<circle cx="722" cy="57" r="8" class="end-circle-outer"/>
<circle cx="722" cy="57" r="5" class="end-circle-inner"/>
