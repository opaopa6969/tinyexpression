<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="525" height="90">
<style>
  svg { background: white; font-family: sans-serif; }
  .rail { stroke: #333; stroke-width: 2; fill: none; }
  .arrow { fill: #333; }
  .terminal-box { fill: #E8F4FD; stroke: #2196F3; stroke-width: 2; rx: 10; ry: 10; }
  .nonterminal-box { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 2; }
  .nonterminal-box:hover { fill: #C8E6C9; stroke: #2E7D32; cursor: pointer; }
  .terminal-text { font-family: monospace; font-size: 14px; fill: #0D47A1; }
  .nonterminal-text { font-family: sans-serif; font-size: 14px; fill: #1B5E20; }
  a:hover .nonterminal-text { fill: #1B5E20; text-decoration: underline; }
  .start-circle { fill: #333; stroke: none; }
  .end-circle-outer { fill: #333; stroke: none; }
  .end-circle-inner { fill: white; stroke: none; }
</style>
<text x="20" y="38" font-size="13" fill="#555" font-family="sans-serif">BooleanCase</text>
<circle cx="26" cy="57" r="6" class="start-circle"/>
<line x1="32" y1="57" x2="50" y2="57" class="rail"/>
<a xlink:href="#BooleanExpression" target="_top">
<rect x="50" y="44" width="173" height="26" class="nonterminal-box"/>
<text x="136" y="62" text-anchor="middle" class="nonterminal-text">BooleanExpression</text>
</a>
<line x1="223" y1="57" x2="239" y2="57" class="rail"/>
<polygon points="228,54 234,57 228,60" class="arrow"/>
<rect x="239" y="44" width="56" height="26" rx="10" ry="10" class="terminal-box"/>
<text x="267" y="62" text-anchor="middle" class="terminal-text">'-&gt;'</text>
<line x1="295" y1="57" x2="311" y2="57" class="rail"/>
<polygon points="300,54 306,57 300,60" class="arrow"/>
<a xlink:href="#BooleanCaseValue" target="_top">
<rect x="311" y="44" width="164" height="26" class="nonterminal-box"/>
<text x="393" y="62" text-anchor="middle" class="nonterminal-text">BooleanCaseValue</text>
</a>
<line x1="475" y1="57" x2="489" y2="57" class="rail"/>
<circle cx="497" cy="57" r="8" class="end-circle-outer"/>
<circle cx="497" cy="57" r="5" class="end-circle-inner"/>
</svg>
