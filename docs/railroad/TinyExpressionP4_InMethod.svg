<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="696" height="90">
<style>
  svg { background: white; font-family: sans-serif; }
  .rail { stroke: #333; stroke-width: 2; fill: none; }
  .arrow { fill: #333; }
  .terminal-box { fill: #E8F4FD; stroke: #2196F3; stroke-width: 2; rx: 10; ry: 10; }
  .nonterminal-box { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 2; }
  .nonterminal-box:hover { fill: #C8E6C9; stroke: #2E7D32; cursor: pointer; }
  .terminal-text { font-family: monospace; font-size: 14px; fill: #0D47A1; }
  .nonterminal-text { font-family: sans-serif; font-size: 14px; fill: #1B5E20; }
  a:hover .nonterminal-text { fill: #1B5E20; text-decoration: underline; }
  .start-circle { fill: #333; stroke: none; }
  .end-circle-outer { fill: #333; stroke: none; }
  .end-circle-inner { fill: white; stroke: none; }
</style>
<text x="20" y="38" font-size="13" fill="#555" font-family="sans-serif">InMethod</text>
<circle cx="26" cy="57" r="6" class="start-circle"/>
<line x1="32" y1="57" x2="50" y2="57" class="rail"/>
<a xlink:href="#StringExpression" target="_top">
<rect x="50" y="44" width="164" height="26" class="nonterminal-box"/>
<text x="132" y="62" text-anchor="middle" class="nonterminal-text">StringExpression</text>
</a>
<line x1="214" y1="57" x2="230" y2="57" class="rail"/>
<polygon points="219,54 225,57 219,60" class="arrow"/>
<rect x="230" y="44" width="65" height="26" rx="10" ry="10" class="terminal-box"/>
<text x="262" y="62" text-anchor="middle" class="terminal-text">'.in'</text>
<line x1="295" y1="57" x2="311" y2="57" class="rail"/>
<polygon points="300,54 306,57 300,60" class="arrow"/>
<rect x="311" y="44" width="47" height="26" rx="10" ry="10" class="terminal-box"/>
<text x="334" y="62" text-anchor="middle" class="terminal-text">'('</text>
<line x1="358" y1="57" x2="374" y2="57" class="rail"/>
<polygon points="363,54 369,57 363,60" class="arrow"/>
<a xlink:href="#CommaSeparatedStrings" target="_top">
<rect x="374" y="44" width="209" height="26" class="nonterminal-box"/>
<text x="478" y="62" text-anchor="middle" class="nonterminal-text">CommaSeparatedStrings</text>
</a>
<line x1="583" y1="57" x2="599" y2="57" class="rail"/>
<polygon points="588,54 594,57 588,60" class="arrow"/>
<rect x="599" y="44" width="47" height="26" rx="10" ry="10" class="terminal-box"/>
<text x="622" y="62" text-anchor="middle" class="terminal-text">')'</text>
<line x1="646" y1="57" x2="660" y2="57" class="rail"/>
<circle cx="668" cy="57" r="8" class="end-circle-outer"/>
<circle cx="668" cy="57" r="5" class="end-circle-inner"/>
</svg>
